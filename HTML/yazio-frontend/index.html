<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazio - Health & Nutrition Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            padding: 60px 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        a {
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-register {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-register:hover {
            background: #f5f5f5;
        }
        
        .features {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .features h3 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .feature-item {
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .feature-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .feature-item p {
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Yazio</h1>
        <p>Your intelligent health and nutrition companion</p>
        
        <div class="buttons">
            <a href="login.html" class="btn-login">Login</a>
            <a href="register.html" class="btn-register">Create Account</a>
        </div>
        
        <div class="features">
            <h3>Features</h3>
            <div class="features-grid">
                <div class="feature-item">
                    <div class="icon">📊</div>
                    <p>Nutrition Tracking</p>
                </div>
                <div class="feature-item">
                    <div class="icon">🏃</div>
                    <p>Activity Logging</p>
                </div>
                <div class="feature-item">
                    <div class="icon">⏱️</div>
                    <p>Fasting Management</p>
                </div>
                <div class="feature-item">
                    <div class="icon">💧</div>
                    <p>Water Tracking</p>
                </div>
                <div class="feature-item">
                    <div class="icon">⚖️</div>
                    <p>Weight Monitoring</p>
                </div>
                <div class="feature-item">
                    <div class="icon">🎯</div>
                    <p>Goal Challenges</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/api/axios-client.js"></script>
    <script src="js/services/auth.service.js"></script>
    <script>
        // Redirect to dashboard if already logged in
        if (AuthService.isAuthenticated()) {
            window.location.href = 'dashboard-example.html';
        }
    </script>
</body>
</html>
