<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Yazio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .logo p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .link-group {
            text-align: center;
            margin-top: 20px;
        }

        .link-group a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }

        .link-group a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .test-credentials {
            background: #f5f5f5;
            border-left: 3px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 13px;
        }

        .test-credentials p {
            margin: 5px 0;
            color: #666;
        }

        .test-credentials code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #d63384;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="logo">
            <h1>🍽️ Yazio</h1>
            <p>Quản lý dinh dưỡng thông minh</p>
        </div>

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="user@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Đăng nhập
            </button>
        </form>

        <!-- Links -->
        <div class="link-group">
            <a href="register.html">Tạo tài khoản</a>
            <span>•</span>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <!-- Test Credentials -->
        <div class="test-credentials">
            <p><strong>Test:</strong></p>
            <p>Email: <code>test@example.com</code></p>
            <p>Password: <code>password123</code></p>
            <p style="margin-top: 10px; color: #999; font-size: 12px;">
                Đăng ký tài khoản mới hoặc sử dụng thông tin test
            </p>
        </div>
    </div>

    <!-- Include necessary scripts -->
    <script src="js/api/axios-client.js"></script>
    <script src="js/config/api.config.js"></script>
    <script src="js/utils/error-handler.js"></script>
    <script src="js/services/auth.service.js"></script>

    <script>
        // Check if already logged in
        if (AuthService.isAuthenticated()) {
            window.location.href = 'dashboard-example.html';
        }

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const alertDiv = document.getElementById('alert');

            // Validation
            if (!email || !password) {
                showAlert('Vui lòng nhập email và mật khẩu', 'error');
                return;
            }

            try {
                // Show loading state
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span>Đang đăng nhập...';

                // Attempt login
                const response = await AuthService.login(email, password);

                // Success
                showAlert('✓ Đăng nhập thành công! Đang chuyển hướng...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard-example.html';
                }, 1500);

            } catch (error) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Đăng nhập';
                showAlert(error.message || 'Đăng nhập thất bại', 'error');
                console.error('Login error:', error);
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert show alert-${type}`;

            if (type === 'error') {
                setTimeout(() => {
                    alertDiv.classList.remove('show');
                }, 5000);
            }
        }

        // Override notification system
        window.showNotification = showAlert;
    </script>
</body>
</html>
